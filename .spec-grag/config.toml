[sources]
# H-4 calibration corpus + conflict_review 試験用矛盾 fixture (30)
# - 30 は 29 の API と shared_identifier (bindContext / extend / replace) で繋がりつつ
#   require ↔ forbid の対立を含む。conflict_review pipeline の発火試験用
include = [
  "テスト用ドキュメント/25_コンポーネント層（配置操作）.md",
  "テスト用ドキュメント/27_内部世界の基盤制御とStoreGroup設計原則.md",
  "テスト用ドキュメント/29_振る舞い層（Customize側API一覧）.md",
  "テスト用ドキュメント/30_テスト用矛盾例.md",
]
exclude = ["archive/**", "**/drafts/**"]

[core]
purpose_file = "テスト用ドキュメント/01_システム目標.md"
concept_file = ".spec-grag/concept.md"

[context]
storage = ".spec-grag/context"

[section]
max_heading_level = 4

[section_metadata]
summary_enabled = true
search_keys_enabled = true
related_sections_enabled = true

[chapter_anchor]
enabled = true

[llm]

[llm.providers.codex]
provider = "codex_cli"
command = "codex"
model = "gpt-5.4-mini"
effort = "low"
timeout_sec = 120
max_retries = 1

[llm.providers.claude_typing]
provider = "claude_cli"
command = "claude"
model = "claude-sonnet-4-6"
effort = "low"
timeout_sec = 360
max_retries = 1

[llm.providers.claude_judge]
provider = "claude_cli"
command = "claude"
model = "claude-sonnet-4-6"
effort = "low"
timeout_sec = 360
max_retries = 1

[llm.stage_routing]
section_metadata  = "codex"           # gpt-5.4-mini / low (抽出最速)
related_sections  = "claude_typing"   # sonnet-4-6 / low (recall 0% empty で最良)
conflict_review   = "claude_judge"    # sonnet-4-6 / low (暫定、conflict fixture で要確認)
chapter_key_anchor = "codex"          # gpt-5.4-mini / low

[retrieval]
chunk_size = 1200
chunk_overlap = 160
dense_top_k = 12
sparse_top_k = 20
rank_fusion = "rrf"
section_collection = "spec_grag_section"
section_dense_threshold = 0.55
section_candidate_top_k = 16
section_final_top_n = 8

[embedding]
provider = "flagembedding"
model = "BAAI/bge-m3"
dense_enabled = true
sparse_enabled = true

[vector_store]
provider = "qdrant"
url = "http://localhost:6333"
collection = "spec_grag_source"

[limits]
section_summary_max_chars = 480
search_keys_max = 32
related_candidate_max_per_section = 32
related_selected_max_per_section = 8
conflict_pair_max_per_section = 8
llm_batch_max_sections = 8
llm_batch_max_chars = 12000
# Codex Pro 5x + Claude Max 5x 環境で 4 並列。8 でも余裕あり、user 判断で増減可
llm_batch_concurrency = 4

[watcher]
enabled = true
interval_ms = 2000
debounce_ms = 1000
stale_lock_ms = 300000
state_file = ".spec-grag/state/watch_state.json"
queue_file = ".spec-grag/state/watch_queue.json"
